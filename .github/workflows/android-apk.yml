name: Android APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: APK build type
        required: true
        default: debug
        type: choice
        options:
          - debug
          - release

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BUILD_TYPE: ${{ inputs.build_type }}
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Prepare release signing
        shell: bash
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > release.keystore
            {
              echo "storeFile=release.keystore"
              echo "storePassword=$ANDROID_KEYSTORE_PASSWORD"
              echo "keyAlias=$ANDROID_KEY_ALIAS"
              echo "keyPassword=$ANDROID_KEY_PASSWORD"
            } > local.properties
          elif [ "$BUILD_TYPE" = "release" ]; then
            echo "::warning::Release signing secrets are not configured. The release artifact will be unsigned."
          fi

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Build APK
        shell: bash
        run: |
          task="assemble${BUILD_TYPE^}"
          ./gradlew ":app:$task" --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: hacg-${{ inputs.build_type }}-apk
          path: |
            app/build/outputs/apk/**/*.apk
            release/*.apk
          if-no-files-found: error

      - name: Prepare release metadata
        id: release
        shell: bash
        run: |
          version_name="$(sed -n 's/.*versionName = "\(.*\)".*/\1/p' app/build.gradle.kts | head -n 1)"
          version_code="$(sed -n 's/.*versionCode = \([0-9][0-9]*\).*/\1/p' app/build.gradle.kts | head -n 1)"
          tag="v${version_name}-${BUILD_TYPE}.${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}"
          title="HAcg ${version_name} ${BUILD_TYPE} build ${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}"
          {
            echo "tag=$tag"
            echo "title=$title"
            echo "version_name=$version_name"
            echo "version_code=$version_code"
          } >> "$GITHUB_OUTPUT"
          cat > release-notes.md <<EOF
          Automated ${BUILD_TYPE} APK build.

          Version: ${version_name} (${version_code})
          Commit: ${GITHUB_SHA}
          Workflow run: ${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}
          EOF

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          shopt -s globstar nullglob
          assets=(app/build/outputs/apk/**/*.apk)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No APK files found."
            exit 1
          fi
          flags=()
          if [ "$BUILD_TYPE" != "release" ]; then
            flags+=(--prerelease)
          fi
          gh release create "${{ steps.release.outputs.tag }}" "${assets[@]}" \
            --title "${{ steps.release.outputs.title }}" \
            --notes-file release-notes.md \
            --target "$GITHUB_SHA" \
            "${flags[@]}"
