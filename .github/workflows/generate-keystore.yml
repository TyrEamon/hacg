name: Generate Android Keystore

on:
  workflow_dispatch:
    inputs:
      alias:
        description: Key alias
        required: true
        default: hacg
      common_name:
        description: Certificate common name
        required: true
        default: TyrEamon

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Generate keystore package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p keystore-output
          store_password="$(openssl rand -base64 24 | tr -d '\n')"
          key_password="$(openssl rand -base64 24 | tr -d '\n')"
          key_alias="${{ inputs.alias }}"
          common_name="${{ inputs.common_name }}"

          keytool -genkeypair \
            -v \
            -keystore keystore-output/hacg-release.jks \
            -storetype JKS \
            -alias "$key_alias" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "$store_password" \
            -keypass "$key_password" \
            -dname "CN=${common_name}, OU=Personal, O=${common_name}, L=Shanghai, S=Shanghai, C=CN"

          base64 -w 0 keystore-output/hacg-release.jks > keystore-output/hacg-release-base64.txt

          {
            echo "ANDROID_KEYSTORE_BASE64="
            cat keystore-output/hacg-release-base64.txt
            echo
            echo "ANDROID_KEYSTORE_PASSWORD=$store_password"
            echo "ANDROID_KEY_ALIAS=$key_alias"
            echo "ANDROID_KEY_PASSWORD=$key_password"
          } > keystore-output/github-actions-secrets.txt

          cat > keystore-output/README.txt <<'EOF'
          Copy the values from github-actions-secrets.txt into:

          GitHub repository -> Settings -> Secrets and variables -> Actions -> Repository secrets

          Required secret names:
          ANDROID_KEYSTORE_BASE64
          ANDROID_KEYSTORE_PASSWORD
          ANDROID_KEY_ALIAS
          ANDROID_KEY_PASSWORD

          Important:
          Keep hacg-release.jks and these passwords forever. Future release APKs can only cover-install old release APKs when signed with the same keystore.
          After you download this artifact and add the secrets, delete this workflow run/artifact.
          EOF

      - name: Upload keystore package
        uses: actions/upload-artifact@v4
        with:
          name: hacg-android-keystore-secrets
          path: keystore-output/*
          retention-days: 1
          if-no-files-found: error
