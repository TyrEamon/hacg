<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="user-scalable=no, width=device-width, initial-scale=1, maximum-scale=1">
    <title>{{title}}</title>
    <style type="text/css">
        * {
            font-size: 1em;
            line-height: 1.5em;
            word-wrap: break-word;
            max-width: 100%;
        }
        body {
            background-color: {{backgroundColor}};
            color: {{contentColor}};
        }
        h1 {
            color: {{titleColor}};
            font-size: 1.5em;
        }
        h2 {
            font-size: 1.4em;
        }
        h3 {
            font-size: 1.3em;
        }
        h4 {
            font-size: 1.2em;
        }
        h5 {
            font-size: 1.1em;
        }
        pre {
            white-space: pre-wrap;
        }
        a {
            color: {{accentColor}};
        }
        .tags {
            margin: -0.5em 0 1em;
            line-height: 2em;
        }
        .tag {
            display: inline-block;
            margin: 0 0.35em 0.45em 0;
            padding: 0.05em 0.55em;
            border-radius: 0.35em;
            color: #FFFFFF;
            font-size: 0.9em;
            text-decoration: none;
        }
        img, audio, video {
            width: 100%;
        }
        ul, li { 
            padding: 0;
            margin: 0;
            list-style: none;
        }
    </style>
    <script src="file:///android_asset/jquery-3.5.1.min.js"></script>
    <script src="file:///android_asset/jquery.lazyload.min.js"></script>
    <script>
        $(function () {
            $("img.lazy").lazyload({
                placeholder: "file:///android_res/drawable/loading.png"
            });
        });
    </script>
</head>
<body>
<h1>{{title}}</h1>
{{tags}}

<div>{{body}}</div>
</body>
</html>
